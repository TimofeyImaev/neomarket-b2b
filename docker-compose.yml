services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: neomarket
      POSTGRES_PASSWORD: neomarket
      POSTGRES_DB: b2b
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neomarket -d b2b"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://neomarket:neomarket@db:5432/b2b
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_ALGORITHM: HS256
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
